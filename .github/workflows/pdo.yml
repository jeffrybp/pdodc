name: Scheduler Playwright pdo

on:
  schedule:
    - cron: '*/15 * * * *'  # Setiap 15 menit
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install playwright node-fetch@3.3.2

      - name: Run script
        run: node scripts/pdo.js
